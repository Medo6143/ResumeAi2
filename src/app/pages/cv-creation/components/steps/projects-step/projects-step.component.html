<div class="space-y-5" [formGroup]="form">
    <div class="flex items-center justify-between">
        <span class="studio-badge">{{ 'CV_CREATE.EDUCATION.OPTIONAL' | translate }}</span>
        <button type="button" (click)="addProject()" class="studio-btn-accent">
            <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
            </svg>
            {{ 'CV_CREATE.PROJECTS.ADD' | translate }}
        </button>
    </div>

    <div formArrayName="projects" class="space-y-4">
        <div *ngFor="let proj of projectsControls; let i = index" [formGroupName]="i"
            class="studio-form-card border-l-2 border-l-neutral-300 dark:border-l-neutral-600">

            <div class="flex items-start justify-between mb-4">
                <div class="flex items-center gap-2">
                    <span class="studio-badge font-mono">{{ i + 1 }}</span>
                    <h3 class="text-sm font-bold text-neutral-900 dark:text-white">
                        {{ 'CV_CREATE.PROJECTS.ITEM_TITLE' | translate }} {{ i + 1 }}
                    </h3>
                </div>
                <button type="button" (click)="removeProject(i)"
                    class="studio-btn-danger opacity-0 group-hover:opacity-100">
                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                <div>
                    <label class="studio-label">{{ 'CV_CREATE.PROJECTS.NAME' | translate }}</label>
                    <input formControlName="name" type="text" class="studio-input"
                        [placeholder]="'CV_CREATE.PROJECTS.NAME' | translate">
                </div>
                <div>
                    <label class="studio-label">
                        {{ 'CV_CREATE.PROJECTS.LINK' | translate }}
                        <span class="text-neutral-400 dark:text-neutral-500">({{ 'CV_CREATE.EDUCATION.OPTIONAL' | translate }})</span>
                    </label>
                    <input formControlName="link" type="text" class="studio-input"
                        [placeholder]="'CV_CREATE.PERSONAL.GITHUB_PLACEHOLDER' | translate">
                </div>
            </div>

            <div>
                <label class="studio-label">{{ 'CV_CREATE.PROJECTS.DESCRIPTION' | translate }}</label>
                <textarea formControlName="description" rows="3" class="studio-textarea"
                    [placeholder]="'CV_CREATE.PROJECTS.DESC_PLACEHOLDER' | translate"></textarea>
            </div>
        </div>
    </div>
</div>
