<div class="space-y-6" [formGroup]="form">

    <!-- Photo Upload -->
    <div class="flex flex-col items-center gap-4 p-5 rounded-xl border border-dashed border-neutral-300 dark:border-neutral-700 bg-neutral-50 dark:bg-neutral-900/50">
        <input type="file" #fileInput hidden (change)="onFileSelected($event)" accept="image/*">

        <div class="relative group cursor-pointer" (click)="fileInput.click()">
            <div class="w-20 h-20 rounded-full overflow-hidden border-2 border-white dark:border-neutral-700 shadow-sm bg-neutral-200 dark:bg-neutral-800 flex items-center justify-center">
                <img *ngIf="form.get('photo')?.value" [src]="form.get('photo')?.value" class="w-full h-full object-cover">
                <div *ngIf="!form.get('photo')?.value" class="text-neutral-400">
                    <svg class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" />
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" />
                    </svg>
                </div>
            </div>
            <div class="absolute inset-0 bg-black/40 rounded-full flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                <span class="text-white text-[10px] font-semibold">{{ 'CV_CREATE.PERSONAL.CHANGE' | translate }}</span>
            </div>
        </div>

        <div class="flex gap-2">
            <button type="button" (click)="fileInput.click()" class="studio-btn-accent">
                {{ 'CV_CREATE.PERSONAL.UPLOAD' | translate }}
            </button>
            <button *ngIf="form.get('photo')?.value" type="button" (click)="removePhoto()" class="studio-btn-danger">
                {{ 'CV_CREATE.COMMON.REMOVE' | translate }}
            </button>
        </div>
        <p class="text-[11px] text-neutral-500 dark:text-neutral-400 text-center max-w-xs leading-relaxed">
            {{ 'CV_CREATE.PERSONAL.PHOTO_RECOMMENDED' | translate }}<br>
            {{ 'CV_CREATE.PERSONAL.PHOTO_SUPPORT_NOTE' | translate }}
        </p>
    </div>

    <!-- Identity -->
    <div>
        <h4 class="studio-label !text-[10px] !mb-3">Identity</h4>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
                <label class="studio-label">{{ 'CV_CREATE.PERSONAL.NAME' | translate }}</label>
                <input type="text" formControlName="fullName" class="studio-input"
                    [placeholder]="'CV_CREATE.PERSONAL.NAME_PLACEHOLDER' | translate">
            </div>
            <div>
                <label class="studio-label">{{ 'CV_CREATE.PERSONAL.JOB_TITLE' | translate }}</label>
                <input type="text" formControlName="jobTitle" class="studio-input"
                    [placeholder]="'ATS_FORM.JOB_TITLE_PLACEHOLDER' | translate">
            </div>
        </div>
    </div>

    <!-- Contact -->
    <div>
        <h4 class="studio-label !text-[10px] !mb-3">Contact</h4>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
                <label class="studio-label">{{ 'CV_CREATE.PERSONAL.EMAIL' | translate }}</label>
                <input type="email" formControlName="email" class="studio-input"
                    [placeholder]="'CV_CREATE.PERSONAL.EMAIL_PLACEHOLDER' | translate">
            </div>
            <div>
                <label class="studio-label">{{ 'CV_CREATE.PERSONAL.PHONE' | translate }}</label>
                <input type="tel" formControlName="phone" class="studio-input"
                    [placeholder]="'CV_CREATE.PERSONAL.PHONE_PLACEHOLDER' | translate">
            </div>
            <div>
                <label class="studio-label">{{ 'CV_CREATE.PERSONAL.LOCATION' | translate }}</label>
                <input type="text" formControlName="location" class="studio-input"
                    [placeholder]="'CV_CREATE.PERSONAL.LOCATION_PLACEHOLDER' | translate">
            </div>
        </div>
    </div>

    <!-- Links -->
    <div>
        <h4 class="studio-label !text-[10px] !mb-3">Links</h4>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
                <label class="studio-label">{{ 'CV_CREATE.PERSONAL.LINKEDIN' | translate }}</label>
                <input type="url" formControlName="linkedin" class="studio-input"
                    [placeholder]="'CV_CREATE.PERSONAL.LINKEDIN_PLACEHOLDER' | translate">
            </div>
            <div>
                <label class="studio-label">{{ 'CV_CREATE.PERSONAL.GITHUB' | translate }}</label>
                <input type="url" formControlName="github" class="studio-input"
                    [placeholder]="'CV_CREATE.PERSONAL.GITHUB_PLACEHOLDER' | translate">
            </div>
            <div>
                <label class="studio-label">{{ 'CV_CREATE.PERSONAL.PORTFOLIO' | translate }}</label>
                <input type="text" formControlName="portfolio" class="studio-input"
                    [placeholder]="'CV_CREATE.PERSONAL.PORTFOLIO_PLACEHOLDER' | translate">
            </div>
            <div>
                <label class="studio-label">{{ 'CV_CREATE.PERSONAL.WEBSITE' | translate }}</label>
                <input type="url" formControlName="website" class="studio-input"
                    [placeholder]="'CV_CREATE.PERSONAL.WEBSITE_PLACEHOLDER' | translate">
            </div>
        </div>
    </div>
</div>
