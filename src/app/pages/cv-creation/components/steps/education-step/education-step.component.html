<div class="space-y-6 pt-6 border-t border-slate-200" [formGroup]="form">
    <div class="flex items-center justify-between">
        <h3 class="text-lg font-bold text-slate-800">{{ 'CV_CREATE.EDUCATION.TITLE' | translate }}</h3>
        <button type="button" (click)="addEducation()"
            class="text-sm font-bold px-4 py-2 rounded-xl bg-gradient-to-r from-emerald-50 to-green-50 text-indigo-600 hover:shadow-sm transition-all flex items-center gap-2">
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
            </svg>
            {{ 'CV_CREATE.EDUCATION.ADD' | translate }}
        </button>
    </div>

    <div formArrayName="education" class="space-y-4">
        <div *ngFor="let edu of educationControls; let i = index" [formGroupName]="i"
            class="p-4 rounded-xl border border-slate-200 bg-white/50 group hover:shadow-sm transition-all">

            <div class="flex items-start justify-between mb-3">
                <div
                    class="w-8 h-8 rounded-lg bg-slate-100 text-slate-600 flex items-center justify-center text-sm font-bold">
                    {{ i + 1 }}
                </div>
                <button type="button" (click)="removeEducation(i)"
                    class="text-slate-400 hover:text-rose-500 transition-colors opacity-0 group-hover:opacity-100">
                    <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-semibold text-slate-600 mb-1">{{ 'CV_CREATE.EDUCATION.INSTITUTION'
                        | translate }}</label>
                    <input formControlName="school" type="text" [placeholder]="'CV_CREATE.EDUCATION.SCHOOL' | translate"
                        class="w-full rounded-lg border border-slate-200/70 bg-white/90 px-3 py-2.5 text-sm text-slate-900 placeholder-slate-400 shadow-sm transition focus:border-indigo-500 focus:ring-3 focus:ring-indigo-200/60 dark:border-slate-700/60 dark:bg-slate-900/60 dark:text-slate-100 dark:placeholder-slate-500 dark:focus:border-indigo-400 dark:focus:ring-indigo-500/20 outline-none">
                </div>

                <div>
                    <label class="block text-xs font-semibold text-slate-600 mb-1">{{ 'CV_CREATE.EDUCATION.DEGREE_MAJOR'
                        | translate }}</label>
                    <input formControlName="degree" type="text" [placeholder]="'CV_CREATE.EDUCATION.DEGREE' | translate"
                        class="w-full rounded-lg border border-slate-200/70 bg-white/90 px-3 py-2.5 text-sm text-slate-900 placeholder-slate-400 shadow-sm transition focus:border-indigo-500 focus:ring-3 focus:ring-indigo-200/60 dark:border-slate-700/60 dark:bg-slate-900/60 dark:text-slate-100 dark:placeholder-slate-500 dark:focus:border-indigo-400 dark:focus:ring-indigo-500/20 outline-none">
                </div>

                <div>
                    <label class="block text-xs font-semibold text-slate-600 mb-1">{{ 'CV_CREATE.EDUCATION.GRAD_YEAR' |
                        translate }}</label>
                    <input formControlName="graduationDate" type="number" min="1900" max="2100"
                        class="w-full rounded-lg border border-slate-200/70 bg-white/90 px-3 py-2.5 text-sm text-slate-900 placeholder-slate-400 shadow-sm transition focus:border-indigo-500 focus:ring-3 focus:ring-indigo-200/60 dark:border-slate-700/60 dark:bg-slate-900/60 dark:text-slate-100 dark:placeholder-slate-500 dark:focus:border-indigo-400 dark:focus:ring-indigo-500/20 outline-none"
                        [placeholder]="'CV_CREATE.EDUCATION.GRAD_YEAR_PLACEHOLDER' | translate">
                </div>

                <div>
                    <label class="block text-xs font-semibold text-slate-600 mb-1">{{ 'CV_CREATE.EDUCATION.GPA' |
                        translate }} <span class="text-slate-400">({{ 'CV_CREATE.EDUCATION.OPTIONAL' | translate
                            }})</span></label>
                    <input formControlName="gpa" type="text"
                        [placeholder]="'CV_CREATE.EDUCATION.GPA_PLACEHOLDER' | translate"
                        class="w-full rounded-lg border border-slate-200/70 bg-white/90 px-3 py-2.5 text-sm text-slate-900 placeholder-slate-400 shadow-sm transition focus:border-indigo-500 focus:ring-3 focus:ring-indigo-200/60 dark:border-slate-700/60 dark:bg-slate-900/60 dark:text-slate-100 dark:placeholder-slate-500 dark:focus:border-indigo-400 dark:focus:ring-indigo-500/20 outline-none">
                </div>
            </div>
        </div>
    </div>
</div>
