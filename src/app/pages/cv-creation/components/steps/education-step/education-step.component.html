<div class="space-y-5" [formGroup]="form">
    <div class="flex items-center justify-between">
        <div></div>
        <button type="button" (click)="addEducation()" class="studio-btn-accent">
            <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
            </svg>
            {{ 'CV_CREATE.EDUCATION.ADD' | translate }}
        </button>
    </div>

    <div formArrayName="education" class="space-y-4">
        <div *ngFor="let edu of educationControls; let i = index" [formGroupName]="i"
            class="studio-form-card border-l-2 border-l-emerald-500 dark:border-l-emerald-400">

            <div class="flex items-start justify-between mb-4">
                <div class="flex items-center gap-2">
                    <span class="studio-badge font-mono">{{ i + 1 }}</span>
                </div>
                <button type="button" (click)="removeEducation(i)"
                    class="studio-btn-danger opacity-0 group-hover:opacity-100">
                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="studio-label">{{ 'CV_CREATE.EDUCATION.INSTITUTION' | translate }}</label>
                    <input formControlName="school" type="text" class="studio-input"
                        [placeholder]="'CV_CREATE.EDUCATION.SCHOOL' | translate">
                </div>
                <div>
                    <label class="studio-label">{{ 'CV_CREATE.EDUCATION.DEGREE_MAJOR' | translate }}</label>
                    <input formControlName="degree" type="text" class="studio-input"
                        [placeholder]="'CV_CREATE.EDUCATION.DEGREE' | translate">
                </div>
                <div>
                    <label class="studio-label">{{ 'CV_CREATE.EDUCATION.GRAD_YEAR' | translate }}</label>
                    <input formControlName="graduationDate" type="number" min="1900" max="2100" class="studio-input"
                        [placeholder]="'CV_CREATE.EDUCATION.GRAD_YEAR_PLACEHOLDER' | translate">
                </div>
                <div>
                    <label class="studio-label">
                        {{ 'CV_CREATE.EDUCATION.GPA' | translate }}
                        <span class="text-neutral-400 dark:text-neutral-500">({{ 'CV_CREATE.EDUCATION.OPTIONAL' | translate }})</span>
                    </label>
                    <input formControlName="gpa" type="text" class="studio-input"
                        [placeholder]="'CV_CREATE.EDUCATION.GPA_PLACEHOLDER' | translate">
                </div>
            </div>
        </div>
    </div>
</div>
