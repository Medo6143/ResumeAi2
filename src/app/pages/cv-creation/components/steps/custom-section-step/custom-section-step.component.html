<div class="space-y-5" [formGroup]="form">
    <div class="flex items-center justify-between">
        <div></div>
        <button type="button" (click)="addCustomSection()" class="studio-btn-accent">
            <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
            </svg>
            {{ 'CV_CREATE.CUSTOM.ADD' | translate }}
        </button>
    </div>

    <div formArrayName="customSections" class="space-y-4">
        <div *ngFor="let section of customSectionsControls; let i = index" [formGroupName]="i"
            class="studio-form-card border-l-2 border-l-purple-500 dark:border-l-purple-400">

            <div class="flex items-center justify-between mb-4">
                <input formControlName="title" type="text"
                    [placeholder]="'CV_CREATE.CUSTOM.SECTION_PLACEHOLDER' | translate"
                    class="text-sm font-bold bg-transparent border-b border-neutral-200 dark:border-neutral-700 focus:border-indigo-500 dark:focus:border-indigo-400 outline-none w-full py-1.5 text-neutral-900 dark:text-white placeholder-neutral-400 transition-colors">
                <button type="button" (click)="removeCustomSection(i)" class="studio-btn-danger ml-3">
                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>

            <div formArrayName="items" class="space-y-2">
                <div *ngFor="let item of getCustomSectionItems(i); let j = index" [formGroupName]="j"
                    class="flex gap-2 items-start group/item p-3 rounded-lg bg-neutral-50 dark:bg-neutral-800/50 hover:bg-white dark:hover:bg-neutral-800 transition-colors">

                    <div class="flex-1 grid grid-cols-1 md:grid-cols-2 gap-2">
                        <input formControlName="name" type="text" class="studio-input !py-2 !text-xs"
                            [placeholder]="'CV_CREATE.CUSTOM.ITEM_NAME' | translate">
                        <textarea formControlName="description" rows="1" class="studio-textarea !py-2 !text-xs !resize-none"
                            [placeholder]="'CV_CREATE.CUSTOM.DETAIL' | translate"></textarea>
                    </div>

                    <button type="button" (click)="removeCustomItem(i, j)"
                        class="text-neutral-300 dark:text-neutral-600 hover:text-red-500 dark:hover:text-red-400 transition-colors opacity-0 group-hover/item:opacity-100 mt-2">
                        <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                        </svg>
                    </button>
                </div>

                <button type="button" (click)="addCustomItem(i)" class="studio-btn-ghost !text-xs !text-indigo-600 dark:!text-indigo-400">
                    <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
                    </svg>
                    {{ 'CV_CREATE.CUSTOM.ADD_ITEM' | translate }}
                </button>
            </div>
        </div>
    </div>
</div>
