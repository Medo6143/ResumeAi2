<div class="space-y-4">
    <div class="flex items-center justify-between">
        <label class="studio-label !mb-0">{{ 'CV_CREATE.SUMMARY.TITLE' | translate }}</label>
        <button (click)="generateAiSummary()" [disabled]="loading" class="studio-btn-accent">
            <svg *ngIf="!loading" class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9.813 15.904L9 18.75l-.813-2.846a4.5 4.5 0 00-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 003.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 003.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 00-3.09 3.09z" />
            </svg>
            <svg *ngIf="loading" class="animate-spin w-3.5 h-3.5" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            <span class="font-mono">{{ (loading ? 'CV_CREATE.CHAT.THINKING' : 'CV_CREATE.COMMON.GENERATE_AI') | translate }}</span>
        </button>
    </div>

    <div class="relative">
        <textarea [ngModel]="summary" (ngModelChange)="updateSummary($event)" rows="6"
            class="studio-textarea"
            [placeholder]="'CV_CREATE.SUMMARY.PLACEHOLDER' | translate"></textarea>
        <div class="absolute bottom-3 right-3">
            <span class="studio-badge font-mono">{{ summary.length }}</span>
        </div>
    </div>

    <p class="text-xs text-neutral-500 dark:text-neutral-400 leading-relaxed">
        {{ 'CV_CREATE.SUMMARY.TIP' | translate }}
    </p>
</div>
