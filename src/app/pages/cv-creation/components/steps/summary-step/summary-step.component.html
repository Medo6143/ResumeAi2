<div class="space-y-4">
    <div class="flex justify-between items-center mb-2">
        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">Professional Summary</label>
        <button (click)="generateAiSummary()" [disabled]="loading"
            class="text-xs px-3 py-1.5 bg-purple-100 text-purple-700 rounded-md hover:bg-purple-200 disabled:opacity-50 flex items-center gap-1 transition-colors">
            <span *ngIf="!loading">✨ AI Generate</span>
            <span *ngIf="loading">Generating...</span>
        </button>
    </div>

    <textarea [ngModel]="summary" (ngModelChange)="updateSummary($event)" rows="6"
        class="w-full rounded-xl border border-slate-200/70 bg-white/90 px-4 py-3 text-sm text-slate-900 placeholder-slate-400 shadow-sm transition focus:border-indigo-500 focus:ring-4 focus:ring-indigo-200/70 dark:border-slate-700/60 dark:bg-slate-900/60 dark:text-slate-100 dark:placeholder-slate-500 dark:focus:border-indigo-400 dark:focus:ring-indigo-500/20 outline-none text-sm leading-relaxed resize-y"
        placeholder="Briefly describe your professional background and key achievements..."></textarea>

    <p class="text-xs text-gray-500 dark:text-gray-400">
        Tip: A strong summary should be 2-3 sentences highlighting your years of experience and top skills.
    </p>
</div>
