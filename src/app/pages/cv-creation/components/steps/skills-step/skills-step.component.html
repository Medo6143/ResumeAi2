<div class="space-y-4">
    <div class="flex items-center justify-between">
        <h3 class="text-lg font-bold text-slate-800">{{ 'CV_CREATE.SKILLS.TITLE' | translate }}</h3>
        <button type="button" (click)="analyzeSkills()" [disabled]="isAnalyzingSkills()"
            class="text-xs font-bold px-3 py-1.5 rounded-lg bg-gradient-to-r from-amber-500 to-orange-600 text-white hover:shadow-md transition-all flex items-center gap-2 disabled:opacity-50">
            <svg *ngIf="!isAnalyzingSkills()" class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
            </svg>
            <svg *ngIf="isAnalyzingSkills()" class="animate-spin w-3.5 h-3.5" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor"
                    d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                </path>
            </svg>
            {{ (isAnalyzingSkills() ? 'CV_CREATE.SKILLS.ANALYZING' : 'CV_CREATE.SKILLS.SUGGEST') | translate }}
        </button>
    </div>

    <div class="relative">
        <textarea [formControl]="skillsInput" (blur)="parseSkills()" rows="3"
            class="w-full rounded-xl border border-slate-200/70 bg-white/90 px-4 py-3 text-sm text-slate-900 placeholder-slate-400 shadow-sm transition focus:border-indigo-500 focus:ring-4 focus:ring-indigo-200/70 dark:border-slate-700/60 dark:bg-slate-900/60 dark:text-slate-100 dark:placeholder-slate-500 dark:focus:border-indigo-400 dark:focus:ring-indigo-500/20 outline-none resize-y"
            [placeholder]="'CV_CREATE.SKILLS.PLACEHOLDER' | translate"></textarea>
        <div class="absolute bottom-3 right-3 text-xs text-slate-400">
            {{ 'CV_CREATE.SKILLS.COUNT' | translate: { count: skillsList.length } }}
        </div>
    </div>

    <div class="flex flex-wrap gap-2 min-h-12">
        <span *ngFor="let skill of skillsList; let i = index"
            class="px-3 py-1.5 rounded-full bg-gradient-to-r from-indigo-50 to-purple-50 text-indigo-700 text-sm font-medium border border-indigo-100 hover:shadow-sm transition-all group relative">
            {{ skill }}
            <button type="button" (click)="removeSkill(i)"
                class="absolute -top-1 -right-1 w-4 h-4 bg-rose-500 text-white rounded-full text-[10px] opacity-0 group-hover:opacity-100 transition-opacity">
                ×
            </button>
        </span>

        <span *ngIf="skillsList.length === 0" class="text-slate-400 text-sm">
            {{ 'CV_CREATE.SKILLS.NONE' | translate }}
        </span>
    </div>
</div>
