<div class="space-y-4">
    <div class="flex items-center justify-between">
        <div></div>
        <button type="button" (click)="analyzeSkills()" [disabled]="isAnalyzingSkills()" class="studio-btn-accent">
            <svg *ngIf="!isAnalyzingSkills()" class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9.813 15.904L9 18.75l-.813-2.846a4.5 4.5 0 00-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 003.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 003.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 00-3.09 3.09z" />
            </svg>
            <svg *ngIf="isAnalyzingSkills()" class="animate-spin w-3.5 h-3.5" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            <span class="font-mono">{{ (isAnalyzingSkills() ? 'CV_CREATE.SKILLS.ANALYZING' : 'CV_CREATE.SKILLS.SUGGEST') | translate }}</span>
        </button>
    </div>

    <div class="relative">
        <textarea [formControl]="skillsInput" (blur)="parseSkills()" rows="3"
            class="studio-textarea"
            [placeholder]="'CV_CREATE.SKILLS.PLACEHOLDER' | translate"></textarea>
        <div class="absolute bottom-3 right-3">
            <span class="studio-badge font-mono">{{ 'CV_CREATE.SKILLS.COUNT' | translate: { count: skillsList.length } }}</span>
        </div>
    </div>

    <div class="flex flex-wrap gap-2 min-h-[48px]">
        <span *ngFor="let skill of skillsList; let i = index" class="studio-skill-tag">
            {{ skill }}
            <button type="button" (click)="removeSkill(i)"
                class="w-3.5 h-3.5 flex items-center justify-center rounded-full bg-neutral-300 dark:bg-neutral-600 text-neutral-600 dark:text-neutral-300 text-[9px] opacity-0 group-hover/tag:opacity-100 hover:bg-red-500 hover:text-white transition-all">
                &times;
            </button>
        </span>

        <span *ngIf="skillsList.length === 0" class="text-sm text-neutral-400 dark:text-neutral-500 italic">
            {{ 'CV_CREATE.SKILLS.NONE' | translate }}
        </span>
    </div>
</div>
