<div class="min-h-screen bg-slate-950 text-white flex flex-col md:flex-row font-sans">

    <!-- Mobile Overlay -->
    @if (sidebarOpen()) {
    <div class="fixed inset-0 bg-black/60 backdrop-blur-sm z-40 md:hidden" (click)="closeSidebar()"></div>
    }

    <!-- Sidebar -->
    <aside
        class="fixed md:static inset-y-0 left-0 z-50 w-64 bg-slate-900 border-r border-slate-800 flex flex-col transition-transform duration-300"
        [ngClass]="sidebarOpen() ? 'translate-x-0' : '-translate-x-full md:translate-x-0'">
        <!-- Brand -->
        <div class="h-16 flex items-center px-6 border-b border-slate-800">
            <a routerLink="/"
                class="text-xl font-black tracking-tight bg-gradient-to-r from-blue-500 to-indigo-400 bg-clip-text text-transparent flex items-center gap-2">
                <svg class="w-6 h-6 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                </svg>
                ResumeAI <span class="text-xs font-bold text-slate-500 mt-1 uppercase tracking-widest">Admin</span>
            </a>
        </div>

        <!-- Navigation -->
        <nav class="flex-1 overflow-y-auto py-6 px-4 space-y-1">
            <p class="text-[10px] font-bold text-slate-600 uppercase tracking-widest px-4 mb-3">Analytics</p>
            <a routerLink="/admin" routerLinkActive="bg-indigo-500/10 text-indigo-400 border-indigo-500"
                [routerLinkActiveOptions]="{exact: true}"
                class="flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-bold text-slate-400 hover:text-white hover:bg-slate-800 border border-transparent transition-all">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z">
                    </path>
                </svg>
                Dashboard
            </a>

            <p class="text-[10px] font-bold text-slate-600 uppercase tracking-widest px-4 mb-3 mt-6">Management</p>
            <a routerLink="/admin/users" routerLinkActive="bg-indigo-500/10 text-indigo-400 border-indigo-500"
                class="flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-bold text-slate-400 hover:text-white hover:bg-slate-800 border border-transparent transition-all">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z">
                    </path>
                </svg>
                Users
            </a>

            <a routerLink="/admin/activity-log" routerLinkActive="bg-indigo-500/10 text-indigo-400 border-indigo-500"
                class="flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-bold text-slate-400 hover:text-white hover:bg-slate-800 border border-transparent transition-all">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                </svg>
                Activity Log
            </a>

            <p class="text-[10px] font-bold text-slate-600 uppercase tracking-widest px-4 mb-3 mt-6">System</p>
            <a routerLink="/admin/settings" routerLinkActive="bg-indigo-500/10 text-indigo-400 border-indigo-500"
                class="flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-bold text-slate-400 hover:text-white hover:bg-slate-800 border border-transparent transition-all">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z">
                    </path>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                </svg>
                Settings
            </a>
        </nav>

        <!-- Bottom User Actions -->
        <div class="p-4 border-t border-slate-800">
            <button (click)="logout()"
                class="w-full flex items-center justify-center gap-2 px-4 py-2 rounded-xl text-sm font-bold text-red-400 hover:text-red-300 hover:bg-red-400/10 transition-colors">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1">
                    </path>
                </svg>
                Sign Out
            </button>
        </div>
    </aside>

    <!-- Main Content Area -->
    <main class="flex-1 flex flex-col min-h-0 overflow-hidden bg-[#0A0F1C]">
        <!-- Top Navigation -->
        <header
            class="h-16 bg-slate-900/50 backdrop-blur-md border-b border-slate-800/50 flex items-center justify-between px-4 md:px-8 sticky top-0 z-10">

            <!-- Mobile Hamburger -->
            <button (click)="toggleSidebar()" class="md:hidden p-2 rounded-lg hover:bg-slate-800 transition-colors">
                <svg class="w-6 h-6 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16">
                    </path>
                </svg>
            </button>

            <h2 class="text-lg font-bold text-slate-200">Admin Control Panel</h2>
            <div class="flex items-center gap-4">
                <span class="relative flex h-3 w-3">
                    <span
                        class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-3 w-3 bg-emerald-500"></span>
                </span>
                <span class="text-xs font-bold text-slate-400 uppercase tracking-wider hidden sm:block">System
                    Online</span>
            </div>
        </header>

        <!-- Route Content -->
        <div class="flex-1 overflow-y-auto p-4 md:p-8">
            <div class="max-w-7xl mx-auto">
                <router-outlet></router-outlet>
            </div>
        </div>
    </main>
</div>
