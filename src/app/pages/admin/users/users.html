<div class="space-y-8">

    <header class="flex flex-col md:flex-row md:items-end justify-between gap-4 mb-8">
        <div>
            <h1 class="text-3xl font-black text-white tracking-tight">Users Management</h1>
            <p class="text-slate-400 mt-2">View, search, and manage platform access for all registered users.</p>
        </div>

        <div class="flex items-center gap-3">
            <!-- Export CSV Button -->
            <button (click)="exportCSV()"
                class="flex items-center gap-2 px-4 py-2.5 rounded-xl text-sm font-bold bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 hover:bg-emerald-500/20 transition-all">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z">
                    </path>
                </svg>
                Export CSV
            </button>
        </div>
    </header>

    <!-- Filters Row -->
    <div class="flex flex-col sm:flex-row gap-3">
        <!-- Search -->
        <div class="relative flex-1">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                <svg class="w-5 h-5 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                </svg>
            </div>
            <input type="text"
                class="block w-full pl-10 pr-3 py-3 border border-slate-700 rounded-xl leading-5 bg-slate-900 text-slate-300 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm transition-all"
                placeholder="Search by name or email..." [ngModel]="searchQuery" (ngModelChange)="onSearch($event)">
        </div>

        <!-- Role Filter -->
        <select [ngModel]="roleFilter" (ngModelChange)="onRoleFilter($event)"
            class="px-4 py-3 rounded-xl bg-slate-900 border border-slate-700 text-slate-300 text-sm font-bold focus:outline-none focus:ring-2 focus:ring-indigo-500 cursor-pointer">
            <option value="all">All Roles</option>
            <option value="admin">Admin</option>
            <option value="user">User</option>
        </select>

        <!-- Status Filter -->
        <select [ngModel]="statusFilter" (ngModelChange)="onStatusFilter($event)"
            class="px-4 py-3 rounded-xl bg-slate-900 border border-slate-700 text-slate-300 text-sm font-bold focus:outline-none focus:ring-2 focus:ring-indigo-500 cursor-pointer">
            <option value="all">All Status</option>
            <option value="active">Active</option>
            <option value="blocked">Blocked</option>
        </select>
    </div>

    <!-- Results Count -->
    <div class="flex items-center justify-between">
        <p class="text-sm text-slate-500">
            Showing <span class="font-bold text-slate-300">{{ filteredUsers.length }}</span> of
            <span class="font-bold text-slate-300">{{ users.length }}</span> users
        </p>
    </div>

    <!-- Data Table -->
    <div class="bg-slate-900 border border-slate-800 rounded-2xl shadow-xl overflow-hidden">
        <app-data-table [data]="filteredUsers" [columns]="columns" (actionClick)="handleAction($event)"
            [loading]="isLoading">
        </app-data-table>
    </div>

</div>
