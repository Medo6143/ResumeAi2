<section class="py-24 bg-white dark:bg-gray-950">
    <div class="container mx-auto px-4">
        <div class="text-center mb-16">
            <h2 class="text-3xl md:text-5xl font-bold text-gray-900 dark:text-white mb-4">
                How is it <span class="italic text-blue-600">so detailed</span>?
            </h2>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8 relative">
            <!-- Connecting Line (Desktop) -->
            <div
                class="hidden lg:block absolute top-12 left-[10%] right-[10%] h-0.5 bg-gradient-to-r from-blue-500/0 via-blue-500/20 to-blue-500/0 z-0">
            </div>

            <div *ngFor="let step of steps; let i = index"
                class="relative z-10 flex flex-col items-center text-center group">
                <div
                    class="w-24 h-24 rounded-3xl bg-white dark:bg-gray-900 border-2 border-gray-100 dark:border-gray-800 shadow-xl flex items-center justify-center text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-br from-blue-500 to-purple-500 mb-6 group-hover:scale-110 group-hover:border-blue-500/50 transition-all duration-300">
                    {{ step.num }}
                </div>
                <h3 class="text-xl font-bold text-gray-900 dark:text-white mb-2">{{ step.title }}</h3>
                <p class="text-gray-500 dark:text-gray-400 text-sm max-w-[200px]">{{ step.desc }}</p>
            </div>
        </div>
    </div>
</section>
