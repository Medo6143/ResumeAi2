<section class="py-24 bg-white dark:bg-slate-950" aria-labelledby="how-it-works-heading">
    <div class="container mx-auto px-4">
        <div class="text-center mb-16">
            <h2 id="how-it-works-heading" class="text-3xl md:text-5xl font-bold text-slate-900 dark:text-white mb-4">
                {{ 'HOW_IT_WORKS.TITLE_1' | translate }} <span class="italic text-blue-600 dark:text-blue-400">{{
                    'HOW_IT_WORKS.TITLE_2' |
                    translate }}</span>?
            </h2>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8 relative">
            <!-- Connecting Line (Desktop) -->
            <div class="hidden lg:block absolute top-12 left-[10%] right-[10%] h-0.5 bg-gradient-to-r from-blue-500/0 via-blue-500/30 to-blue-500/0 z-0"
                aria-hidden="true">
            </div>

            <div *ngFor="let step of steps; let i = index"
                class="relative z-10 flex flex-col items-center text-center group">
                <div class="w-24 h-24 rounded-3xl bg-white dark:bg-slate-900 border-2 border-slate-100 dark:border-slate-700 shadow-xl flex items-center justify-center text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-br from-blue-500 to-purple-500 mb-6 group-hover:scale-110 group-hover:border-blue-500/50 transition-all duration-300"
                    aria-hidden="true">
                    {{ step.num }}
                </div>
                <h3 class="text-xl font-bold text-slate-900 dark:text-white mb-2">{{ step.titleKey | translate }}</h3>
                <p class="text-slate-500 dark:text-slate-400 text-sm max-w-[200px]">{{ step.descKey | translate }}</p>
            </div>
        </div>
    </div>
</section>
