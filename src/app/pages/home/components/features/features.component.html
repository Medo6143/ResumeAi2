<section class="py-24 bg-white dark:bg-[#0B0F19] relative overflow-hidden">
    <!-- Background Decoration -->
    <div class="absolute inset-0 bg-grid-black/[0.02] dark:bg-grid-white/[0.02] -z-10"></div>

    <div class="container mx-auto px-4">
        <div class="text-center max-w-3xl mx-auto mb-20">
            <h2 class="text-sm font-semibold text-blue-600 dark:text-blue-400 tracking-wider uppercase mb-2">Features
            </h2>
            <h3 class="text-4xl md:text-5xl font-bold text-gray-900 dark:text-white mb-6">
                Supercharge your <br>
                <span class="text-transparent bg-clip-text bg-gradient-to-r from-blue-500 to-purple-500">Job
                    Search</span>
            </h3>
            <p class="text-gray-600 dark:text-gray-400 text-lg">
                Our platform combines cutting-edge AI with professional design to give you the unfair advantage.
            </p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 auto-rows-[300px]">
            <!-- Large Feature Item -->
            <div *ngFor="let feature of features; let i = index" [class.md:col-span-2]="i === 0 || i === 3"
                class="group relative overflow-hidden rounded-3xl p-8 border border-gray-100 dark:border-white/10 bg-white dark:bg-white/5 backdrop-blur-sm hover:border-blue-500/30 transition-all duration-500 hover:shadow-2xl hover:shadow-blue-500/10">

                <!-- Hover Gradient -->
                <div
                    class="absolute inset-0 bg-gradient-to-br from-blue-500/5 to-purple-500/5 opacity-0 group-hover:opacity-100 transition-opacity duration-500">
                </div>

                <div class="relative z-10 h-full flex flex-col justify-between">
                    <div>
                        <div
                            class="w-16 h-16 rounded-2xl bg-blue-50 dark:bg-blue-900/20 flex items-center justify-center text-3xl mb-6 group-hover:scale-110 transition-transform duration-500">
                            {{ feature.icon }}
                        </div>
                        <h3 class="text-2xl font-bold text-gray-900 dark:text-white mb-3">
                            {{ feature.title }}
                        </h3>
                        <p class="text-gray-600 dark:text-gray-400 leading-relaxed text-lg">
                            {{ feature.desc }}
                        </p>
                    </div>

                    <!-- Arrow Icon showing on hover -->
                    <div
                        class="flex justify-end opacity-0 group-hover:opacity-100 transform translate-y-4 group-hover:translate-y-0 transition-all duration-300">
                        <div
                            class="w-10 h-10 rounded-full bg-blue-100 dark:bg-blue-900/30 flex items-center justify-center text-blue-600 dark:text-blue-400">
                            →
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
