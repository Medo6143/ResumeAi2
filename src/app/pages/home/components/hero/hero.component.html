<section
  class="relative overflow-hidden bg-gray-50 dark:bg-[#0B0F19] min-h-[90vh] flex items-center justify-center pt-20">
  <!-- Modern Animated Background -->
  <div class="absolute inset-0 w-full h-full overflow-hidden pointer-events-none">
    <!-- Main Gradient Orb -->
    <div
      class="absolute top-[-10%] left-[50%] -translate-x-1/2 w-[800px] h-[800px] bg-blue-500/20 rounded-full blur-[120px] animate-pulse">
    </div>
    <!-- Secondary Orbs -->
    <div
      class="absolute top-[20%] left-[10%] w-[500px] h-[500px] bg-purple-500/20 rounded-full blur-[100px] animate-blob animation-delay-2000">
    </div>
    <div
      class="absolute bottom-[10%] right-[10%] w-[600px] h-[600px] bg-cyan-500/20 rounded-full blur-[120px] animate-blob animation-delay-4000">
    </div>
    <!-- Grid Pattern Overlay -->
    <div
      class="absolute inset-0 bg-[url('https://grainy-gradients.vercel.app/noise.svg')] opacity-20 brightness-100 contrast-150 mix-blend-overlay">
    </div>
    <div class="absolute inset-0 bg-grid-white/[0.02] bg-[length:50px_50px]"></div>
  </div>

  <div class="container mx-auto px-4 relative z-10">
    <div class="flex flex-col items-center text-center max-w-5xl mx-auto">

      <!-- Badge -->
      <div
        class="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-white/5 dark:bg-white/10 border border-white/10 dark:border-white/20 backdrop-blur-md mb-8 animate-fade-in-down hover:scale-105 transition-transform cursor-default shadow-lg shadow-blue-500/10">
        <span
          class="flex h-2.5 w-2.5 rounded-full bg-green-400 animate-pulse shadow-[0_0_10px_rgba(74,222,128,0.5)]"></span>
        <span class="text-sm font-semibold text-gray-700 dark:text-gray-200 tracking-wide">Powered by GPT-4o & Claude
          3.5</span>
      </div>

      <!-- Main Headline -->
      <h1
        class="text-5xl md:text-7xl lg:text-8xl font-black tracking-tight text-gray-900 dark:text-white mb-8 animate-fade-in-up leading-[1.1]">
        Craft Your <br class="hidden md:block" />
        <span class="relative">
          <span
            class="text-transparent bg-clip-text bg-gradient-to-r from-blue-500 via-purple-500 to-cyan-500 animate-gradient-x">Perfect
            Resume</span>
          <!-- Underline decoration -->
          <svg class="absolute w-full h-3 -bottom-2 left-0 text-blue-500/50" viewBox="0 0 100 10"
            preserveAspectRatio="none">
            <path d="M0 5 Q 50 10 100 5" stroke="currentColor" stroke-width="2" fill="none" />
          </svg>
        </span>
      </h1>

      <!-- Description -->
      <p
        class="text-xl md:text-2xl text-gray-600 dark:text-gray-300 max-w-3xl mx-auto mb-12 animate-fade-in-up delay-100 font-light leading-relaxed">
        Beat the ATS bots with AI-optimized resumes.
        <span class="text-gray-900 dark:text-white font-medium">Analyze, improve, and generate</span>
        executive-level CVs in seconds, not hours.
      </p>

      <!-- CTA Buttons -->
      <div
        class="flex flex-col sm:flex-row items-center justify-center gap-6 animate-fade-in-up delay-200 w-full sm:w-auto">
        <button routerLink="/create"
          class="group relative px-8 py-4 w-full sm:w-auto rounded-2xl bg-gradient-to-r from-blue-600 to-purple-600 text-white font-bold text-lg shadow-[0_0_20px_rgba(37,99,235,0.3)] hover:shadow-[0_0_30px_rgba(37,99,235,0.5)] hover:scale-105 transition-all duration-300 overflow-hidden">
          <div
            class="absolute inset-0 bg-white/20 group-hover:translate-x-full transition-transform duration-500 skew-x-12 -translate-x-full">
          </div>
          <span class="flex items-center justify-center gap-2">
            Create Free Resume
            <svg class="w-5 h-5 group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor"
              viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6"></path>
            </svg>
          </span>
        </button>

        <button routerLink="/analyze"
          class="group px-8 py-4 w-full sm:w-auto rounded-2xl bg-white dark:bg-white/5 text-gray-900 dark:text-white font-bold text-lg border border-gray-200 dark:border-white/10 backdrop-blur-sm hover:bg-gray-50 dark:hover:bg-white/10 hover:border-blue-500/30 transition-all duration-300">
          <span class="flex items-center justify-center gap-2">
            📊 Analyze Existing
          </span>
        </button>
      </div>

      <!-- Stats / Social Proof -->
      <div
        class="mt-20 grid grid-cols-2 md:grid-cols-4 gap-8 md:gap-16 border-t border-gray-200 dark:border-white/5 pt-10 animate-fade-in-up delay-300">
        <div>
          <div class="text-3xl font-bold text-gray-900 dark:text-white">10k+</div>
          <div class="text-sm text-gray-500 dark:text-gray-400">Resumes Built</div>
        </div>
        <div>
          <div class="text-3xl font-bold text-gray-900 dark:text-white">95%</div>
          <div class="text-sm text-gray-500 dark:text-gray-400">Success Rate</div>
        </div>
        <div>
          <div class="text-3xl font-bold text-gray-900 dark:text-white">FREE</div>
          <div class="text-sm text-gray-500 dark:text-gray-400">Forever</div>
        </div>
        <div>
          <div class="text-3xl font-bold text-gray-900 dark:text-white">ATS</div>
          <div class="text-sm text-gray-500 dark:text-gray-400">Ready Format</div>
        </div>
      </div>

    </div>
  </div>
</section>
