<section class="py-24 relative" aria-labelledby="stats-heading">
    <div class="max-w-7xl mx-auto px-4">
        <!-- Section Header -->
        <div class="text-center mb-20">
            <h2 id="stats-heading"
                class="text-4xl sm:text-5xl md:text-6xl font-black text-slate-900 dark:text-white mb-6 tracking-tight">
                {{ 'STATS.TITLE_1' | translate }}
                <span class="bg-clip-text text-transparent bg-gradient-to-r from-blue-600 to-indigo-600">
                    {{ 'STATS.TITLE_2' | translate }}
                </span>
            </h2>
            <p class="text-xl text-slate-500 dark:text-slate-400 max-w-xl mx-auto font-medium">
                {{ 'STATS.SUBTITLE' | translate }}
            </p>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-6 md:gap-8">
            <div *ngFor="let stat of stats; trackBy: trackByIndex"
                class="relative group p-8 rounded-[2.5rem] bg-white dark:bg-slate-900 border border-slate-100 dark:border-slate-800 shadow-sm hover:shadow-xl hover:-translate-y-2 transition-all duration-500">
                <div
                    class="text-4xl md:text-5xl lg:text-6xl font-black bg-gradient-to-br from-blue-600 via-indigo-600 to-purple-600 bg-clip-text text-transparent mb-4 tracking-tighter">
                    {{ stat.value }}
                </div>
                <div class="text-sm font-black text-slate-800 dark:text-slate-200 uppercase tracking-widest mb-1">{{
                    stat.labelKey | translate }}</div>
                <div class="text-xs text-slate-500 dark:text-slate-400 font-medium leading-relaxed">{{ stat.descKey |
                    translate }}</div>
            </div>
        </div>
    </div>
</section>
