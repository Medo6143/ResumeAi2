<section class="relative py-32 overflow-hidden bg-slate-50/50 dark:bg-slate-900/20">
    <div class="absolute inset-x-0 top-0 h-24 bg-gradient-to-b from-white dark:from-slate-950 to-transparent"></div>
    <div class="absolute inset-x-0 bottom-0 h-24 bg-gradient-to-t from-white dark:from-slate-950 to-transparent"></div>

    <div class="relative max-w-7xl mx-auto px-6">
        <div class="text-center mb-20 animate-fade-in">
            <h2 class="text-5xl font-black text-slate-950 dark:text-white mb-6 tracking-tight">
                Global Impact in <span
                    class="bg-gradient-to-r from-blue-600 to-indigo-600 text-transparent bg-clip-text">Real
                    Numbers</span>
            </h2>
            <p class="text-xl text-slate-600 dark:text-slate-400 font-medium">Empowering the next generation of top-tier
                talent.</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8">
            <div *ngFor="let stat of stats; trackBy: trackByIndex"
                class="group relative p-10 bg-white dark:bg-slate-900/50 backdrop-blur-2xl rounded-[2.5rem] border border-slate-200/60 dark:border-white/5 shadow-2xl shadow-slate-200/50 dark:shadow-none hover:shadow-blue-500/10 transition-all duration-700 hover:-translate-y-2 overflow-hidden">
                <!-- Background Pattern -->
                <div
                    class="absolute -right-4 -bottom-4 w-32 h-32 bg-blue-500/5 rounded-full blur-2xl group-hover:bg-blue-500/10 transition-colors">
                </div>

                <div class="relative z-10">
                    <div
                        class="text-6xl font-black bg-gradient-to-br from-slate-900 to-slate-500 dark:from-white dark:to-slate-400 text-transparent bg-clip-text mb-4 tracking-tighter group-hover:scale-105 transition-transform duration-500">
                        {{ stat.value }}
                    </div>
                    <div class="text-xl font-bold text-slate-900 dark:text-white mb-2">{{ stat.label }}</div>
                    <div class="text-slate-500 dark:text-slate-400 font-medium leading-relaxed">{{ stat.description }}
                    </div>
                </div>

                <div
                    class="absolute bottom-0 left-0 w-full h-1 bg-gradient-to-r from-blue-600 to-indigo-600 scale-x-0 group-hover:scale-x-100 transition-transform duration-700 origin-left">
                </div>
            </div>
        </div>
    </div>
</section>
