<section class="py-24 relative" aria-labelledby="stats-heading">
    <div class="max-w-7xl mx-auto px-4">
        <!-- Section Header -->
        <div class="text-center mb-20">
            <h2 id="stats-heading"
                class="text-4xl sm:text-5xl md:text-6xl font-black text-slate-900 dark:text-white mb-6 tracking-tight">
                {{ 'STATS.TITLE_1' | translate }}
                <span class="bg-clip-text text-transparent bg-gradient-to-r from-blue-600 to-indigo-600">
                    {{ 'STATS.TITLE_2' | translate }}
                </span>
            </h2>
            <p class="text-xl text-slate-500 dark:text-slate-400 max-w-xl mx-auto font-medium">
                {{ 'STATS.SUBTITLE' | translate }}
            </p>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-8">
            <div *ngFor="let stat of stats; trackBy: trackByIndex"
                class="text-center group hover:scale-105 transition-transform">
                <div
                    class="text-5xl md:text-6xl font-black bg-gradient-to-br from-blue-600 to-indigo-600 bg-clip-text text-transparent mb-3">
                    {{ stat.value }}
                </div>
                <div class="text-lg font-bold text-slate-800 dark:text-white">{{ stat.labelKey | translate }}</div>
                <div class="text-sm text-slate-500 dark:text-slate-400">{{ stat.descKey | translate }}</div>
            </div>
        </div>
    </div>
</section>
