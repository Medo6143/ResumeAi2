<div class="min-h-screen bg-white dark:bg-slate-950 text-slate-900 dark:text-white transition-colors duration-300">
    <!-- Clean Professional Background -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none" aria-hidden="true">
        <!-- Subtle gradient overlay -->
        <div
            class="absolute inset-0 bg-gradient-to-br from-blue-50 via-white to-indigo-50 dark:from-slate-900 dark:via-slate-950 dark:to-indigo-950 opacity-50">
        </div>

        <!-- Minimal floating elements -->
        <div
            class="absolute top-20 right-20 w-64 h-64 bg-blue-200 dark:bg-blue-900/20 rounded-full blur-3xl opacity-10 animate-float-complex">
        </div>
        <div
            class="absolute bottom-20 left-20 w-80 h-80 bg-indigo-200 dark:bg-indigo-900/20 rounded-full blur-3xl opacity-10 animate-float-bob">
        </div>
        <div
            class="absolute top-1/2 left-1/3 w-72 h-72 bg-purple-200 dark:bg-purple-900/20 rounded-full blur-3xl opacity-10 animate-float-reverse">
        </div>
    </div>

    <!-- Main Content -->
    <main>
        <app-hero [userAvatars]="userAvatars"></app-hero>

        <app-stats [stats]="stats"></app-stats>

        <app-ats-preview></app-ats-preview>

        <app-how-it-works></app-how-it-works>

        <app-templates-preview></app-templates-preview>

        <app-features></app-features>

        <app-cta></app-cta>
    </main>
</div>
