<header class="fixed w-full top-0 z-50 glass-effect transition-all duration-300 shadow-sm">
    <div class="container mx-auto px-4 h-16 flex items-center justify-between">
        <!-- Logo -->
        <div class="flex items-center gap-8">
            <a routerLink="/"
                class="text-2xl font-bold bg-gradient-to-r from-blue-500 via-purple-500 to-cyan-500 dark:from-blue-400 dark:via-purple-400 dark:to-cyan-400 text-transparent bg-clip-text hover:opacity-90 transition-all duration-300 hover:scale-105 logo-gradient">
                ResumeAI
            </a>

            <!-- Desktop Navigation -->
            <nav class="hidden lg:flex items-center gap-8">
                <a routerLink="/" routerLinkActive="active text-blue-600 dark:text-blue-400"
                    [routerLinkActiveOptions]="{exact: true}"
                    class="nav-link px-1 py-2 text-gray-600 dark:text-gray-300 hover:text-blue-600 dark:hover:text-blue-400">
                    Home
                </a>
                <a routerLink="/features" routerLinkActive="active text-blue-600 dark:text-blue-400"
                    class="nav-link px-1 py-2 text-gray-600 dark:text-gray-300 hover:text-blue-600 dark:hover:text-blue-400">
                    Features
                </a>
                <a routerLink="/templates" routerLinkActive="active text-blue-600 dark:text-blue-400"
                    class="nav-link px-1 py-2 text-gray-600 dark:text-gray-300 hover:text-blue-600 dark:hover:text-blue-400">
                    Templates
                </a>
                <a routerLink="/chat" routerLinkActive="active text-blue-600 dark:text-blue-400"
                    class="nav-link px-1 py-2 text-gray-600 dark:text-gray-300 hover:text-blue-600 dark:hover:text-blue-400">
                    Chat
                </a>
            </nav>
        </div>

        <!-- Actions -->
        <div class="flex items-center gap-3">
            <!-- Theme Toggle -->
            <button (click)="themeService.toggleTheme()"
                class="hidden sm:flex relative w-12 h-6 rounded-full bg-gradient-to-r from-blue-100 to-purple-100 dark:from-gray-800 dark:to-gray-700 p-1 transition-all duration-300 hover:scale-105 group theme-toggle"
                aria-label="Toggle Theme">
                <span
                    class="absolute inset-0 rounded-full bg-gradient-to-r from-blue-500 to-purple-500 opacity-0 group-hover:opacity-10 transition-opacity"></span>
                <div [class]="themeService.darkMode() ? 'translate-x-6' : 'translate-x-0'"
                    class="w-4 h-4 rounded-full bg-white dark:bg-gray-900 shadow-md transform transition-transform duration-300 flex items-center justify-center theme-toggle-icon">
                    <span class="text-xs" *ngIf="!themeService.darkMode()">☀️</span>
                    <span class="text-xs" *ngIf="themeService.darkMode()">🌙</span>
                </div>
            </button>

            <!-- Mobile Theme Toggle -->
            <button (click)="themeService.toggleTheme()"
                class="sm:hidden p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors"
                aria-label="Toggle Theme">
                <span class="text-lg" *ngIf="!themeService.darkMode()">☀️</span>
                <span class="text-lg" *ngIf="themeService.darkMode()">🌙</span>
            </button>

            <!-- Auth Actions -->
            <div class="flex items-center gap-2" *ngIf="authService.user$ | async as user; else guestActions">
                <div class="hidden sm:flex flex-col items-end mr-2">
                    <span class="text-xs font-bold text-slate-900 dark:text-white">{{ user.displayName || 'User'
                        }}</span>
                    <button (click)="logout()"
                        class="text-[10px] text-red-500 hover:text-red-600 font-bold uppercase tracking-tighter">Sign
                        Out</button>
                </div>
                <div
                    class="w-10 h-10 rounded-xl bg-gradient-to-tr from-blue-600 to-indigo-600 flex items-center justify-center text-white font-bold shadow-lg">
                    {{ (user.displayName || 'U').charAt(0) }}
                </div>
            </div>

            <ng-template #guestActions>
                <div class="flex items-center gap-2">
                    <a routerLink="/login"
                        class="hidden sm:block px-4 py-2.5 text-sm font-bold text-gray-700 dark:text-gray-300 hover:text-blue-600 dark:hover:text-blue-400 transition-colors">
                        Sign In
                    </a>
                    <button routerLink="/register"
                        class="px-5 py-2.5 rounded-xl bg-gradient-to-r from-blue-600 to-indigo-600 text-white text-sm font-bold hover:shadow-lg hover:shadow-blue-500/25 transition-all active:scale-95 group relative overflow-hidden">
                        <span class="relative z-10">Sign Up</span>
                        <span
                            class="absolute inset-0 bg-white/10 opacity-0 group-hover:opacity-100 transition-opacity"></span>
                    </button>
                </div>
            </ng-template>

            <!-- Mobile Menu Button -->
            <button (click)="toggleMenu()"
                class="lg:hidden ml-2 p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors duration-200"
                [class]="isMenuOpen ? 'text-blue-600 dark:text-blue-400' : 'text-gray-600 dark:text-gray-300'">
                <svg [class.rotate-90]="isMenuOpen" class="w-6 h-6 transition-transform duration-300" fill="none"
                    stroke="currentColor" viewBox="0 0 24 24">
                    <path *ngIf="!isMenuOpen" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M4 6h16M4 12h16M4 18h16" />
                    <path *ngIf="isMenuOpen" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </div>
    </div>

    <!-- Mobile Menu -->
    <div *ngIf="isMenuOpen"
        class="lg:hidden bg-white/95 dark:bg-gray-950/95 backdrop-blur-xl border-t border-gray-200/50 dark:border-gray-800/50 animate-slideDown">
        <div class="container mx-auto px-4 py-3 space-y-1">
            <a routerLink="/" (click)="closeMenu()"
                class="flex items-center justify-between px-4 py-3 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors group"
                [class]="isActiveRoute('/') ? 'text-blue-600 dark:text-blue-400 bg-blue-50 dark:bg-blue-900/20' : 'text-gray-700 dark:text-gray-300'">
                <span class="font-medium">Home</span>
                <svg class="w-4 h-4 opacity-0 group-hover:opacity-100 transition-opacity" fill="none"
                    stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
                </svg>
            </a>
            <a routerLink="/features" (click)="closeMenu()"
                class="flex items-center justify-between px-4 py-3 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors group"
                [class]="isActiveRoute('/features') ? 'text-blue-600 dark:text-blue-400 bg-blue-50 dark:bg-blue-900/20' : 'text-gray-700 dark:text-gray-300'">
                <span class="font-medium">Features</span>
                <svg class="w-4 h-4 opacity-0 group-hover:opacity-100 transition-opacity" fill="none"
                    stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
                </svg>
            </a>
            <a routerLink="/templates" (click)="closeMenu()"
                class="flex items-center justify-between px-4 py-3 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors group"
                [class]="isActiveRoute('/templates') ? 'text-blue-600 dark:text-blue-400 bg-blue-50 dark:bg-blue-900/20' : 'text-gray-700 dark:text-gray-300'">
                <span class="font-medium">Templates</span>
                <svg class="w-4 h-4 opacity-0 group-hover:opacity-100 transition-opacity" fill="none"
                    stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
                </svg>
            </a>
            <a routerLink="/chat" (click)="closeMenu()"
                class="flex items-center justify-between px-4 py-3 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors group"
                [class]="isActiveRoute('/chat') ? 'text-blue-600 dark:text-blue-400 bg-blue-50 dark:bg-blue-900/20' : 'text-gray-700 dark:text-gray-300'">
                <span class="font-medium">Chat</span>
                <svg class="w-4 h-4 opacity-0 group-hover:opacity-100 transition-opacity" fill="none"
                    stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
                </svg>
            </a>

            <!-- Mobile Theme Section -->
            <div class="pt-3 mt-3 border-t border-gray-200 dark:border-gray-800">
                <div class="flex items-center justify-between px-4 py-2">
                    <span class="font-medium text-gray-600 dark:text-gray-400">Theme</span>
                    <div class="flex items-center gap-2">
                        <span class="text-sm text-gray-500 dark:text-gray-400">{{ themeService.darkMode() ? 'Dark' :
                            'Light' }}</span>
                        <button (click)="themeService.toggleTheme()"
                            class="p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors">
                            <span class="text-lg" *ngIf="!themeService.darkMode()">🌙</span>
                            <span class="text-lg" *ngIf="themeService.darkMode()">☀️</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</header>
